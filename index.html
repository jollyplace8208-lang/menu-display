<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>每日餐單</title>
<style>
body{margin:0;background:#f6f4ef;font-family:"Microsoft JhengHei","Noto Sans TC";color:#222}
.page{display:none;padding:50px}.page.active{display:block}
.date{font-size:44px;font-weight:bold;margin-bottom:25px}
.meal{margin-bottom:16px;padding:12px;border-radius:8px}
.meal-title{font-size:30px;font-weight:bold}
.meal-content{font-size:28px;white-space:pre-line;padding-left:10px}
.highlight{background:#fff3cd;border-left:10px solid #ff9800}
.footer{position:fixed;bottom:18px;right:28px;font-size:18px;color:#666}
</style>
</head>
<body>

<div id="pages">載入餐單中…</div>
<div class="footer">以上餐單如有更改，恕不另行通知</div>

<script>
const SHEET_ID = "1Qg-VjH32AckzP3LFbYQFnCwZqq6YN0Es2qXIDlRYyAY";
const SHEET_NAME = "Display_Menu";
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`;

const now=new Date(); const m=now.getHours()*60+now.getMinutes();
const inR=(a,b)=>m>=a&&m<=b;
const HL={
  b:inR(8*60,8*60+30),
  l:inR(11*60,12*60),
  t:inR(14*60+45,15*60+15),
  d:inR(17*60,18*60)
};

fetch(URL).then(r=>r.text()).then(t=>{
  const json=JSON.parse(t.substring(47,t.length-2)||"{}");
  const rows=(json.table&&json.table.rows)||[];
  const wrap=document.getElementById("pages"); wrap.innerHTML="";
  let n=0;

  for(let i=0;i<3;i++){
    const d=new Date(); d.setDate(d.getDate()+i);
    const key=d.toLocaleDateString("sv-SE");
    const row=rows.find(x=>x.c&&x.c[0]&&x.c[0].f===key);
    if(!row)continue; n++;
    const p=document.createElement("div");
    p.className="page"+(n===1?" active":"");
    p.innerHTML=`
      <div class="date">${d.toLocaleDateString("zh-HK",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}</div>
      <div class="meal ${HL.b?"highlight":""}"><div class="meal-title">🥣 早餐</div><div class="meal-content">${row.c[1]?.v||""}</div></div>
      <div class="meal ${HL.l?"highlight":""}"><div class="meal-title">🍚 午餐</div><div class="meal-content">${row.c[2]?.v||""}</div></div>
      <div class="meal ${HL.t?"highlight":""}"><div class="meal-title">🍪 下午茶</div><div class="meal-content">${row.c[3]?.v||""}</div></div>
      <div class="meal ${HL.d?"highlight":""}"><div class="meal-title">🍲 晚餐</div><div class="meal-content">${row.c[4]?.v||""}</div></div>
      <div class="meal ${HL.d?"highlight":""}"><div class="meal-title">🍵 湯</div><div class="meal-content">${row.c[5]?.v||""}</div></div>`;
    wrap.appendChild(p);
  }

  if(n===0){wrap.innerHTML="未有餐單資料";}
  else if(n>1){
    const ps=document.querySelectorAll(".page"); let i=0;
    setInterval(()=>{ps[i].classList.remove("active"); i=(i+1)%ps.length; ps[i].classList.add("active");},10000);
  }
}).catch(()=>{
  document.getElementById("pages").innerHTML="餐單載入失敗";
});
</script>
</body>
</html>
