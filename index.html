<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>每日餐單</title>

<style>
/* ===== 1230 x 2160 直向專用（已調細） ===== */
html,body{
  width:1230px;
  height:2160px;
  margin:0;
}
body{
  background:#f4efe6;
  font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;
  color:#2b2b2b;
}
.page{
  display:none;
  padding:40px;
  box-sizing:border-box;
}
.page.active{display:block}

/* ===== Header ===== */
.header{
  background:#6f8f73;
  color:#ffffff;
  padding:28px 32px;
  border-radius:24px;
  margin-bottom:32px;
}
.header h1{
  margin:0;
  font-size:72px;   /* ✅ 調細 */
  font-weight:700;
}
.header .date{
  font-size:56px;   /* ✅ 調細 */
  margin-top:8px;
}

/* ===== 餐卡 ===== */
.meal{
  background:#ffffff;
  border-radius:24px;
  padding:26px 28px;
  margin-bottom:26px;
  border-left:14px solid #f2d8c2;
}

/* 餐別 */
.meal-title{
  font-size:60px;   /* ✅ */
  font-weight:700;
  margin-bottom:10px;
}

/* 內容 */
.meal-content{
  font-size:48px;   /* ✅ 最舒服 */
  line-height:1.45;
  white-space:pre-line;
  padding-left:6px;
}

/* ===== Highlight ===== */
.highlight{
  background:#fff1dc;
  border-left-color:#f4a259;
}

/* ===== Footer ===== */
.footer{
  position:absolute;
  bottom:18px;
  right:28px;
  font-size:26px;
  color:#666;
}
</style>
</head>

<body>

<div id="pages">載入餐單中…</div>
<div class="footer">以上餐單如有更改，恕不另行通知</div>

<script>
/* ===== Google Sheet ===== */
const SHEET_ID   = "1Qg-VjH32AckzP3LFbYQFnCwZqq6YN0Es2qXIDlRYyAY";
const SHEET_NAME = "Display_Menu";
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`;

/* ===== 時段 Highlight（跟你指定） ===== */
const now=new Date();
const mins=now.getHours()*60+now.getMinutes();
const inR=(a,b)=>mins>=a&&mins<=b;
const HL={
  breakfast: inR(8*60,8*60+30),
  lunch:     inR(11*60,12*60),
  tea:       inR(14*60+45,15*60+15),
  dinner:    inR(17*60,18*60)
};

fetch(URL).then(r=>r.text()).then(t=>{
  const json=JSON.parse(t.substring(47,t.length-2));
  const rows=(json.table&&json.table.rows)||[];
  const wrap=document.getElementById("pages");
  wrap.innerHTML="";
  const show=rows.slice(0,3);

  if(show.length===0){
    wrap.innerHTML="<div style='font-size:48px'>未有餐單資料</div>";
    return;
  }

  show.forEach((r,i)=>{
    const d=new Date(); d.setDate(d.getDate()+i);
    const page=document.createElement("div");
    page.className="page"+(i===0?" active":"");

    page.innerHTML=`
      <div class="header">
        <h1>🍽 每日餐單</h1>
        <div class="date">
          ${d.toLocaleDateString("zh-HK",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}
        </div>
      </div>

      <div class="meal ${HL.breakfast?"highlight":""}">
        <div class="meal-title">🥣 早餐</div>
        <div class="meal-content">${r.c[1]?.v||""}</div>
      </div>

      <div class="meal ${HL.lunch?"highlight":""}">
        <div class="meal-title">🍚 午餐</div>
        <div class="meal-content">${r.c[2]?.v||""}</div>
      </div>

      <div class="meal ${HL.tea?"highlight":""}">
        <div class="meal-title">🍪 下午茶</div>
        <div class="meal-content">${r.c[3]?.v||""}</div>
      </div>

      <div class="meal ${HL.dinner?"highlight":""}">
        <div class="meal-title">🍲 晚餐</div>
        <div class="meal-content">${r.c[4]?.v||""}</div>
      </div>

      <div class="meal ${HL.dinner?"highlight":""}">
        <div class="meal-title">🍵 湯</div>
        <div class="meal-content">${r.c[5]?.v||""}</div>
      </div>
    `;
    wrap.appendChild(page);
  });

  if(show.length>1){
    const pages=document.querySelectorAll(".page");
    let idx=0;
    setInterval(()=>{
      pages[idx].classList.remove("active");
      idx=(idx+1)%pages.length;
      pages[idx].classList.add("active");
    },10000);
  }
});
</script>

</body>
</html>
