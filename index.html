<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>每日餐單</title>

<style>
body {
  margin: 0;
  background: #f6f4ef;
  font-family: "Microsoft JhengHei","Noto Sans TC",sans-serif;
  color: #222;
}

.page { display:none; padding:50px; }
.page.active { display:block; }

.date {
  font-size: 44px;
  font-weight: bold;
  margin-bottom: 25px;
}

.meal {
  margin-bottom: 16px;
  padding: 12px;
  border-radius: 8px;
}

.meal-title {
  font-size: 30px;
  font-weight: bold;
}

.meal-content {
  font-size: 28px;
  white-space: pre-line;
  padding-left: 10px;
}

.highlight {
  background: #fff3cd;
  border-left: 10px solid #ff9800;
}

.footer {
  position: fixed;
  bottom: 18px;
  right: 28px;
  font-size: 18px;
  color: #666;
}
</style>
</head>

<body>

<div id="pages">載入餐單中…</div>
<div class="footer">以上餐單如有更改，恕不另行通知</div>

<script>
/* ===== Google Sheet ===== */
const SHEET_ID = "1Qg-VjH32AckzP3LFbYQFnCwZqq6YN0Es2qXIDlRYyAY";
const SHEET_NAME = "Display_Menu";
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`;

/* ===== 時段 Highlight（跟你指定） ===== */
const now = new Date();
const mins = now.getHours() * 60 + now.getMinutes();
const inRange = (a,b) => mins >= a && mins <= b;

const HL = {
  breakfast: inRange(8*60, 8*60+30),      // 08:00–08:30
  lunch:     inRange(11*60, 12*60),        // 11:00–12:00
  tea:       inRange(14*60+45, 15*60+15),  // 14:45–15:15
  dinner:    inRange(17*60, 18*60)         // 17:00–18:00
};

fetch(URL)
  .then(r => r.text())
  .then(t => {
    const json = JSON.parse(t.substring(47, t.length-2));
    const rows = (json.table && json.table.rows) ? json.table.rows : [];
    const pages = document.getElementById("pages");
    pages.innerHTML = "";

    /* ===== 直接用第 1–3 行資料 ===== */
    const showRows = rows.slice(0,3);
    if (showRows.length === 0) {
      pages.innerHTML = "未有餐單資料";
      return;
    }

    showRows.forEach((r, i) => {
      const d = new Date();
      d.setDate(d.getDate()+i);

      const page = document.createElement("div");
      page.className = "page" + (i===0 ? " active":"");

      page.innerHTML = `
        <div class="date">
          ${d.toLocaleDateString("zh-HK",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}
        </div>

        <div class="meal ${HL.breakfast?"highlight":""}">
          <div class="meal-title">🥣 早餐</div>
          <div class="meal-content">${r.c[1]?.v||""}</div>
        </div>

        <div class="meal ${HL.lunch?"highlight":""}">
          <div class="meal-title">🍚 午餐</div>
          <div class="meal-content">${r.c[2]?.v||""}</div>
        </div>

        <div class="meal ${HL.tea?"highlight":""}">
          <div class="meal-title">🍪 下午茶</div>
          <div class="meal-content">${r.c[3]?.v||""}</div>
        </div>

        <div class="meal ${HL.dinner?"highlight":""}">
          <div class="meal-title">🍲 晚餐</div>
          <div class="meal-content">${r.c[4]?.v||""}</div>
        </div>

        <div class="meal ${HL.dinner?"highlight":""}">
          <div class="meal-title">🍵 湯</div>
          <div class="meal-content">${r.c[5]?.v||""}</div>
        </div>
      `;
      pages.appendChild(page);
    });

    /* ===== 輪播 ===== */
    if (showRows.length > 1) {
      const ps = document.querySelectorAll(".page");
      let idx = 0;
      setInterval(()=>{
        ps[idx].classList.remove("active");
        idx = (idx+1)%ps.length;
        ps[idx].classList.add("active");
      }, 10000);
    }
  })
  .catch(()=>{
    document.getElementById("pages").innerHTML = "餐單載入失敗";
  });
</script>

</body>
</html>
