<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>每日餐單</title>

<style>
body {
  margin: 0;
  padding: 40px;
  font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
  background: #f6f4ef;
  color: #222;
}

.container {
  max-width: 100%;
}

.date {
  font-size: 42px;
  font-weight: bold;
  margin-bottom: 20px;
}

.meal {
  margin-bottom: 22px;
}

.meal-title {
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 6px;
}

.meal-content {
  font-size: 30px;
  white-space: pre-line; /* ✅ 保留換行 */
  padding-left: 12px;
}

/* 顏色可自行調 */
.breakfast { color: #2e7d32; }
.lunch { color: #ef6c00; }
.tea { color: #6a1b9a; }
.dinner { color: #1565c0; }
.soup { color: #455a64; }

.footer {
  position: fixed;
  bottom: 20px;
  right: 30px;
  font-size: 20px;
  color: #555;
}
</style>
</head>

<body>
<div class="container">

  <div class="date" id="menuDate">載入中...</div>

  <div class="meal breakfast">
    <div class="meal-title">🥣 早餐</div>
    <div class="meal-content" id="breakfast"></div>
  </div>

  <div class="meal lunch">
    <div class="meal-title">🍚 午餐</div>
    <div class="meal-content" id="lunch"></div>
  </div>

  <div class="meal tea">
    <div class="meal-title">🍪 下午茶</div>
    <div class="meal-content" id="tea"></div>
  </div>

  <div class="meal dinner">
    <div class="meal-title">🍲 晚餐</div>
    <div class="meal-content" id="dinner"></div>
  </div>

  <div class="meal soup">
    <div class="meal-title">🍵 湯</div>
    <div class="meal-content" id="soup"></div>
  </div>

</div>

<div class="footer">
以上餐單如有更改，恕不另行通知
</div>

<script>
// 🔴🔴🔴 只需改呢度 🔴🔴🔴
const SHEET_ID = "1Qg-VjH32AckzP3LFbYQFnCwZqq6YN0Es2qXIDlRYyAY";
const SHEET_NAME = "Display_Menu";

const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`;

fetch(URL)
  .then(res => res.text())
  .then(text => {
    const json = JSON.parse(text.substring(47, text.length - 2));
    const rows = json.table.rows;

    const today = new Date();
    today.setHours(0,0,0,0);
    const todayStr = today.toISOString().slice(0,10);

    rows.forEach(row => {
      const date = row.c[0]?.v;
      if (!date) return;

      if (date === todayStr) {
        const dateText = today.toLocaleDateString("zh-HK", {
          year: "numeric",
          month: "long",
          day: "numeric",
          weekday: "long"
        });

        document.getElementById("menuDate").innerText = dateText;
        document.getElementById("breakfast").innerText = row.c[1]?.v || "";
        document.getElementById("lunch").innerText = row.c[2]?.v || "";
        document.getElementById("tea").innerText = row.c[3]?.v || "";
        document.getElementById("dinner").innerText = row.c[4]?.v || "";
        document.getElementById("soup").innerText = row.c[5]?.v || "";
      }
    });
  })
  .catch(err => {
    document.getElementById("menuDate").innerText = "無法載入餐單";
    console.error(err);
  });
</script>

</body>
</html>
